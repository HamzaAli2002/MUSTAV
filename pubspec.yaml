name: mustav_mobile
description: "MUSTAV Burgers — native mobile ordering app (Khizex Week 2 Build)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local persistence
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Location + Maps
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Connectivity (offline detection)
  connectivity_plus: ^6.0.3

  # Images: caching + downsizing
  cached_network_image: ^3.3.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
